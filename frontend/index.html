<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

    <title>Eye Break Reminder + Face Landmarker</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mediapipe.css">

    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>

    <script src="overlay.js" defer></script>
    <script type="module" src="face.js" defer></script>
    <script type="text/javascript" src="/eel.js"></script>
  </head>

  <body>
    <section id="mediapipe-demo">
      <div class="blend-shapes">
        <ul class="blend-shapes-list" id="image-blend-shapes"></ul>
      </div>
      <div class="blinkbuddy-title">
        <h1>BlinkBuddy</h1>
        <div class="gear-icon"><a href="http://localhost:8000/pages/settings/settings.html"><img src="assets/gear.svg"/></a></div>
      </div>
      <div id="liveView" class="videoView">
        <div class = "information-row">
          <div class = "captioned-switch">
            <span>Camera Detection</span>
            <label class="switch">
              <input type="checkbox" id="camToggle">
              <span class="slider"></span>
            </label>
          </div>
          <div class = "points-tally">
            <img src="assets/trophy.svg"/>
            <p>0</p>
          </div>
        </div>
        <div class="camera-container">
          <div style="position: relative;">
            <video id="webcam" autoplay playsinline></video>
            <canvas class="output_canvas" id="output_canvas" style="position: absolute; left: 0; top: 0;"></canvas>
          </div>
        </div>
      </div>

      <div class="blend-shapes">
        <ul class="blend-shapes-list" id="video-blend-shapes"></ul>
      </div>

      <div style="margin:12px 0; display:flex; gap:8px; flex-wrap:wrap; text-align: center; justify-content: center;">
        <button id="start-log">Start logging</button>
        <button id="stop-log" disabled>Stop logging</button>
        <span id="log-status" style="margin:12px 0; display:flex; gap:8px; flex-wrap:wrap;"></span>
      </div>

      <div class="library">
        <h2>Library</h2>
        <div class="top-row">
          <div class="screen-time card">
            <div class="eye-icon"><img src="assets/screen-time.svg"/></div>
              <div class="non-icon">
                  <div class="title-toggle">
                      <h3>20-20-20</h3>
                      <a onclick="openGame('http://localhost:8000/games/20-20-20/20-20-20.html')" class="start-link">start →</a>
                  </div>
              </div>
          </div>  
          <div class="palming card">
            <div class="palm-icon"><img src="assets/palm.svg"/></div>
              <div class="non-icon">
                  <div class="title-toggle">
                      <h3>Palming</h3>
                      <a onclick="openGame('http://localhost:8000/games/palming/palming.html')" class="start-link">start →</a>
                  </div>
              </div>
          </div> 
        </div>
        <div class="bottom-row">
          <div class="eyelid-closure card">
            <div class="eye-icon"><img src="assets/closed-eye.svg"/></div>
            <div class="non-icon">
                <div class="title-toggle">
                    <h3>Blink Replenish</h3>
                    <a onclick="openGame('http://localhost:8000/games/tone_blinks/tone_blinks.html')" class="start-link">start →</a>
                </div>
            </div>
          </div>
          <div class="blink-rate card">
            <div class="eye-icon"><img src="assets/eye-2.svg"/></div>
            <div class="non-icon">
                <div class="title-toggle">
                    <h3>Lateral Eye Movement</h3>
                    <a onclick="openGame('http://localhost:8000/games/lateral_movement/lateral_movement.html')" class="start-link">start →</a>
                </div>
            </div>
          </div>
        </div>
      </div>
      <div id="game-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:999; justify-content:center; align-items:center;">
        <iframe id="game-frame" src="" style="width:500px; height:auto; min-height:600px; border:none; border-radius:16px; background:white;"></iframe>
      </div>
    </section>
    <script>
      function updatePoints(total) {
        document.querySelector('.points-tally p').textContent = total;
      }
      eel.get_points()(function(total) {
        document.querySelector('.points-tally p').textContent = total;
      });
    </script>
  </body>
</html>
